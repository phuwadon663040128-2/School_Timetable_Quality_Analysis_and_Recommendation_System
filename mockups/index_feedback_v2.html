<!doctype html>
<html lang="th">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>เวอร์ชันหลังแก้ Feedback - ระบบจัดตารางสอน</title>
    <link rel="stylesheet" href="assets/css/styles.css" />
    <link rel="stylesheet" href="assets/css/feedback-v2.css" />
  </head>
  <body class="feedback-v2">
    <div class="app-shell">
      <aside class="sidebar" aria-label="เมนูหลัก">
        <div class="brand-block">
          <div class="brand-mark" aria-hidden="true">ST</div>
          <div>
            <p class="brand-title">คุณภาพตารางสอน</p>
            <p class="brand-subtitle">โรงเรียนตัวอย่าง</p>
          </div>
        </div>

        <div class="role-note" id="roleNote"></div>

        <nav class="side-nav" id="sideNav" aria-label="เมนูตามบทบาท"></nav>

        <div class="sidebar-foot">
          <strong>ปีการศึกษา 2569</strong>
          <span>บันทึกกิจกรรมล่าสุด 01:20 น.</span>
        </div>
      </aside>

      <main class="main-shell">
        <header class="topbar">
          <div>
            <p class="eyebrow">ระบบวิเคราะห์และเพิ่มประสิทธิภาพตารางสอนโรงเรียน</p>
            <h1 id="pageTitle">ภาพรวม</h1>
          </div>

          <div class="topbar-actions">
            <label class="select-label" for="roleSelect">
              <span>บทบาท</span>
              <select id="roleSelect"></select>
            </label>
            <label class="select-label" for="termSelect">
              <span>ภาคเรียน</span>
              <select id="termSelect">
                <option>1/2569</option>
                <option>2/2569</option>
              </select>
            </label>
            <span class="status-pill status-info" id="statusPill">ฉบับร่าง</span>
          </div>
        </header>

        <section class="content-grid" id="contentGrid">
          <div class="workspace" id="workspace" aria-live="polite"></div>
          <aside class="context-panel" id="contextPanel" aria-label="บริบทและสิทธิ์"></aside>
        </section>
      </main>
    </div>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="assets/js/mock-data.js"></script>
    <script src="assets/js/roles.js"></script>
    <script>
      window.RoleConfig.teacher.menus = window.RoleConfig.teacher.menus.filter(([key]) => key !== "reports");
      window.RoleConfig.homeroomTeacher.menus = window.RoleConfig.homeroomTeacher.menus.filter(([key]) => key !== "reports");
    </script>
    <script src="assets/js/app.js"></script>
    <script src="assets/js/feedback-v2.js"></script>
  </body>
</html>
